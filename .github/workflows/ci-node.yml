name: ci-node

on:
    push:
        branches: [main]
        paths:
            - "node/**"
            - ".github/workflows/ci-node.yml"
    pull_request:
        branches: [main]
        paths:
            - "node/**"
            - ".github/workflows/ci-node.yml"

env:
    # Opt into Node 24 for JavaScript-based actions to silence the
    # September 2026 deprecation warning for Node 20.
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

defaults:
    run:
        working-directory: node

jobs:
    build:
        runs-on: ubuntu-latest
        strategy:
            matrix:
                node-version: [20.x]
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: "npm"
                  cache-dependency-path: node/package-lock.json
            - run: npm ci
            - run: npm run lint
            - run: npm run build
            - run: npm test
